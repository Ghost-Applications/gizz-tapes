name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Checkout LFS objects
        run: git lfs checkout
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: zulu
          cache: gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Decode release keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > keys/release.keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      - name: Build and test
        run: >
          ./gradlew :androidApp:test :androidApp:assemble
          -Dorg.gradle.jvmargs="-Xmx4G -Xms1G -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8"
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_LOCATION: ${{ secrets.KEYSTORE_LOCATION }}
      - name: Import GPG key
        run: |
          echo "${{ secrets.PGP_KEY }}" > private.key
          gpg --batch --passphrase "${{ secrets.PGP_PASSWORD }}" --import private.key
      - name: List APK output directories
        run: find androidApp/build/outputs/apk -type f | sort
      - name: Sign APKs with GPG
        run: |
          find androidApp/build/outputs/apk -name "*.apk" | while read -r file; do
            echo "Signing $file"
            gpg --batch --yes --pinentry-mode loopback --passphrase "${{ secrets.PGP_PASSWORD }}" --armor --detach-sign "$file"
          done
      - name: List APK output directories after signing
        run: find androidApp/build/outputs/apk -type f | sort
      - name: Upload foss debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-foss-debug
          path: androidApp/build/outputs/apk/foss/debug/
          if-no-files-found: error
      - name: Upload foss release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-foss-release
          path: androidApp/build/outputs/apk/foss/release/
          if-no-files-found: error
      - name: Upload full debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-full-debug
          path: androidApp/build/outputs/apk/full/debug/
          if-no-files-found: error
      - name: Upload full release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-full-release
          path: androidApp/build/outputs/apk/full/release/
          if-no-files-found: error

  desktop:
    name: Desktop (${{ matrix.artifact-name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            package-task: packageDeb
            artifact-name: desktop-deb
            artifact-path: composeApp/build/compose/binaries/main/deb/
          - os: macos-latest
            package-task: packageDmg
            artifact-name: desktop-dmg
            artifact-path: composeApp/build/compose/binaries/main/dmg/
          - os: windows-latest
            package-task: packageMsi
            artifact-name: desktop-msi
            artifact-path: composeApp/build/compose/binaries/main/msi/
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Checkout LFS objects
        run: git lfs checkout
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: zulu
          cache: gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Install WiX Toolset
        if: matrix.os == 'windows-latest'
        run: |
          choco install wixtoolset
          echo "C:\Program Files (x86)\WiX Toolset v3.11\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Run desktop tests
        if: matrix.os == 'ubuntu-latest'
        run: >
          ./gradlew :composeApp:desktopTest
          -Dorg.gradle.jvmargs="-Xmx4G -Xms1G -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8"
      - name: Package desktop app
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4G -Dfile.encoding=UTF-8"
        run: ./gradlew :composeApp:${{ matrix.package-task }}
      - name: Import GPG key
        shell: bash
        run: |
          echo "${{ secrets.PGP_KEY }}" > private.key
          gpg --batch --passphrase "${{ secrets.PGP_PASSWORD }}" --import private.key
      - name: Sign desktop artifact with GPG
        shell: bash
        run: |
          for file in ${{ matrix.artifact-path }}*; do
            if [ -f "$file" ]; then
              gpg --batch --yes --pinentry-mode loopback --passphrase "${{ secrets.PGP_PASSWORD }}" --armor --detach-sign "$file"
            fi
          done
      - name: Verify desktop signatures
        shell: bash
        run: |
          for file in ${{ matrix.artifact-path }}*; do
            if [ -f "$file" ] && [[ "$file" != *.asc ]] && [ ! -f "$file.asc" ]; then
              echo "Missing signature for $file"
              exit 1
            fi
          done
      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Checkout LFS objects
        run: git lfs checkout
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: zulu
          cache: gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Compile KMP iOS framework
        env:
          SDK_NAME: iphonesimulator
          ARCHS: arm64
        run: >
          ./gradlew :composeApp:compileKotlinIosSimulatorArm64
          -Dorg.gradle.jvmargs="-Xmx4G -Xms1G -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8"
      - name: Run iOS tests
        env:
          SDK_NAME: iphonesimulator
          ARCHS: arm64
        run: >
          ./gradlew :composeApp:iosSimulatorArm64Test
          -Dorg.gradle.jvmargs="-Xmx4G -Xms1G -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8"
      - name: Generate dummy Kotlin framework for CocoaPods
        env:
          SDK_NAME: iphonesimulator
          ARCHS: arm64
        run: ./gradlew :composeApp:generateDummyFramework
      - name: Install CocoaPods dependencies
        run: pod install --project-directory=iosApp
      - name: Build iOS simulator app
        run: |
          xcodebuild \
            -workspace iosApp/iosApp.xcworkspace \
            -scheme iosApp \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS=arm64 \
            SYMROOT=$(pwd)/build/ios \
            build
      - name: Upload iOS simulator app
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: build/ios/Debug-iphonesimulator/*.app
          if-no-files-found: error

  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Checkout LFS objects
        run: git lfs checkout
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: zulu
          cache: gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run detekt
        run: >
          ./gradlew detekt
          -Dorg.gradle.jvmargs="-Xmx4G -Xms1G -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8"
